<!-- Form container -->
<form class="grid gap-4 rounded-xl border border-black/10 bg-white p-4 shadow-lg shadow-black/10 lg:grid-cols-2">
  <div class="flex flex-col gap-1.5 lg:col-span-2">
    <label class="text-sm font-bold text-[#1f1a15]" for="name">Nume complet</label>
    <input class="w-full rounded-lg border border-black/20 px-3 py-2 text-[#1f1a15] focus:border-black/40 focus:outline-none focus:ring-4 focus:ring-black/10" id="name" type="text" />
  </div>

  <div class="flex flex-col gap-1.5">
    <label class="text-sm font-bold text-[#1f1a15]" for="email">Email</label>
    <input class="w-full rounded-lg border border-black/20 px-3 py-2 text-[#1f1a15] focus:border-black/40 focus:outline-none focus:ring-4 focus:ring-black/10" id="email" type="email" />
  </div>

  <div class="flex flex-col gap-1.5">
    <label class="text-sm font-bold text-[#1f1a15]" for="phone">Telefon</label>
    <input class="w-full rounded-lg border border-black/20 px-3 py-2 text-[#1f1a15] focus:border-black/40 focus:outline-none focus:ring-4 focus:ring-black/10" id="phone" type="tel" />
  </div>

  <div class="flex flex-col gap-1.5 lg:col-span-2">
    <label class="text-sm font-bold text-[#1f1a15]" for="message">Mesaj</label>
    <textarea class="w-full rounded-lg border border-black/20 px-3 py-2 text-[#1f1a15] focus:border-black/40 focus:outline-none focus:ring-4 focus:ring-black/10" id="message" rows="4"></textarea>
  </div>

  <button class="inline-flex items-center justify-center rounded-md border border-white/20 bg-gradient-to-br from-[#9a6a45] to-[#7b5234] px-5 py-3 font-semibold text-white shadow-lg shadow-black/25 transition hover:-translate-y-0.5 lg:col-span-2 lg:justify-self-start" type="submit">Trimite</button>
</form>
