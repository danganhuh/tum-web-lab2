backend:
  name: git-gateway
  repo: danganhuh/tum-web-lab2
  branch: master
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/403839a2-c4d8-46c7-94eb-660829b8ab03/pkce
  auth_token_endpoint: /sites/403839a2-c4d8-46c7-94eb-660829b8ab03/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} “{{slug}}” - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete “{{path}}” - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://danganhuh.github.io/tum-web-lab2
display_url: https://danganhuh.github.io/tum-web-lab2

publish_mode: simple

collections:
  - name: articles
    label: Articles
    label_singular: Article
    folder: "src/content/articles"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Date
        name: date
        widget: datetime
        required: true
        date_format: YYYY-MM-DD
        time_format: false
      - label: Description
        name: description
        widget: text
        required: true
      - label: Body
        name: body
        widget: markdown
        required: true

  - name: event_announcements
    label: Event announcements
    label_singular: Event announcement
    folder: "src/content/event-announcements"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Title
        name: title
        widget: string
        required: true
      - label: Date
        name: date
        widget: datetime
        required: true
        date_format: YYYY-MM-DD
        time_format: false
      - label: Description
        name: description
        widget: text
        required: true
      - label: Body
        name: body
        widget: markdown
        required: true

  - name: event_cards
    label: Event cards
    label_singular: Event card
    folder: "src/content/event-cards"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - label: Photo
        name: image
        widget: image
        required: true
      - label: Title
        name: title
        widget: string
        required: true
      - label: Date
        name: date
        widget: datetime
        required: true
        date_format: YYYY-MM-DD
        time_format: false
      - label: Description
        name: description
        widget: text
        required: true
      - label: Body
        name: body
        widget: markdown
        required: true
      - label: Link to event page
        name: link
        widget: string
        required: true
        hint: "Path to the full event announcement, e.g. /event-announcements/2026-04-29-my-event-slug (use the filename without .md)."
